groups:
  - name: backend_health_metrics
    rules:
    - alert: BackendDown
      expr: up{job="backend"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Backend is down"
        description: "Backend has been down for more than 1 minute."

    - alert: FrontendDown
      expr: up{job="frontend"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Frontend is down"
        description: "Frontend has been down for more than 1 minute."

    - alert: MongoDBDown
      expr: up{job="mongodb"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "MongoDB is down"
        description: "MongoDB has been down for more than 1 minute."

    - alert: DatabaseDisconnected
      expr: db_connection_state == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "MongoDB connection lost"
        description: "db_connection_state gauge is 0 — backend lost MongoDB connection."

    - alert: HighErrorRate
      expr: rate(http_errors_total[5m]) / rate(http_requests_total[5m]) > 0.05
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High HTTP error rate"
        description: "HTTP error rate exceeds 5% over the last 5 minutes."

    - alert: HighRequestLatency
      expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High p95 request latency"
        description: "95th percentile latency exceeds 2s over the last 5 minutes."