global:
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@web3platform.com'

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'email'
  routes:
    - match:
        severity: 'critical'
      receiver: 'email'
      continue: true

receivers:
  - name: 'email'
    email_configs:
      - to: 'admin@web3platform.com'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'dev', 'instance']