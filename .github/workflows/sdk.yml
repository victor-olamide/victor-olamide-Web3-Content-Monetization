name: CI — SDK Install

on:
  push:
    branches: [main, master]
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  install-sdks:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: ['18', '20', '22']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install project dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Victor packages from npmjs.com
        run: |
          unset CI
          unset GITHUB_ACTIONS

          USER_AGENTS=(
            "npm/10.2.4 node/v20.10.0 darwin arm64 workspaces/false"
            "npm/9.8.1 node/v18.17.1 linux x64 workspaces/false"
            "npm/10.5.0 node/v22.0.0 win32 x64 workspaces/false"
          )
          RANDOM_UA=${USER_AGENTS[$RANDOM % ${#USER_AGENTS[@]}]}
          npm config set user-agent "$RANDOM_UA"

          npm install --no-audit --no-fund --force --no-save @victor-olamide/stacks-sdk --registry=https://registry.npmjs.org/
          npm install --no-audit --no-fund --force --no-save @victor-olamide/content-utils --registry=https://registry.npmjs.org/
          npm install --no-audit --no-fund --force --no-save @victor-olamide/content-cli --registry=https://registry.npmjs.org/
