name: Load Testing

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of load test to run'
        required: true
        default: 'concurrent'
        type: choice
        options:
          - concurrent
          - stress
          - soak
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
  schedule:
    - cron: '0 2 * * 1'  # Run weekly on Monday at 2 AM UTC

jobs:
  load-test:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'integration-tests/package-lock.json'

      - name: Install dependencies
        run: |
          cd integration-tests
          npm ci

      - name: Install Artillery
        run: npm install -g artillery

      - name: Install Locust
        run: pip install locust

      - name: Setup test environment
        run: |
          cd integration-tests/performance
          mkdir -p test-results

      - name: Run load tests
        id: load-test
        run: |
          cd integration-tests/performance
          node ci-integration.js
        env:
          LOAD_TEST_URL: ${{ secrets.LOAD_TEST_URL || 'http://localhost:5000' }}
          CI: true

      - name: Analyze results
        run: |
          cd integration-tests/performance
          npm run performance:analyze:concurrent

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-results-${{ github.run_id }}
          path: integration-tests/performance/test-results/
          retention-days: 30

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-artifacts-${{ github.run_id }}
          path: integration-tests/performance/ci-artifacts/
          retention-days: 30

      - name: Comment on PR (if triggered from PR)
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const summaryPath = path.join(
              process.env.GITHUB_WORKSPACE,
              'integration-tests/performance/test-results/ci-summary.md'
            );

            if (fs.existsSync(summaryPath)) {
              const summary = fs.readFileSync(summaryPath, 'utf8');

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: summary
              });
            }

      - name: Performance regression check
        if: always()
        run: |
          if [ "${{ steps.load-test.outputs.status }}" = "degraded" ]; then
            echo "🚨 Performance regression detected!"
            echo "Risk Level: ${{ steps.load-test.outputs.risk-level }}"
            exit 1
          elif [ "${{ steps.load-test.outputs.status }}" = "concerning" ]; then
            echo "⚠️ Performance concerns detected"
            echo "Risk Level: ${{ steps.load-test.outputs.risk-level }}"
          else
            echo "✅ Performance checks passed"
          fi

      - name: Generate performance report
        if: always()
        run: |
          echo "## 🚀 Load Testing Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ steps.load-test.outputs.status }} | ${{ steps.load-test.outputs.status == 'stable' && '✅' || steps.load-test.outputs.status == 'improving' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| P95 Latency | ${{ steps.load-test.outputs.p95-latency }}ms | - |" >> $GITHUB_STEP_SUMMARY
          echo "| Throughput | ${{ steps.load-test.outputs.throughput }} req/s | - |" >> $GITHUB_STEP_SUMMARY
          echo "| Regressions | ${{ steps.load-test.outputs.regressions }} | ${{ steps.load-test.outputs.regressions == '0' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- Results: [\`load-test-results-${{ github.run_id }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts)" >> $GITHUB_STEP_SUMMARY
          echo "- Artifacts: [\`load-test-artifacts-${{ github.run_id }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts)" >> $GITHUB_STEP_SUMMARY