name: Deploy Backend to Staging

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  deploy-staging:
    name: Build backend image, deploy to staging, run smoke tests
    runs-on: ubuntu-latest
    env:
      DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      DOCKER_IMAGE_NAME: ${{ secrets.DOCKER_IMAGE_NAME }}
      STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
      STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
      STAGING_SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
      STAGING_CONTAINER_NAME: ${{ secrets.STAGING_CONTAINER_NAME }}
      STAGING_URL: ${{ secrets.STAGING_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js for smoke tests
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build backend Docker image
        run: |
          cd backend
          IMAGE_NAME="${DOCKER_IMAGE_NAME:-web3-content-platform-backend}"
          REGISTRY="${DOCKER_REGISTRY:-docker.io}"
          IMAGE="${REGISTRY}/${IMAGE_NAME}:staging-${GITHUB_RUN_NUMBER}"
          docker build -f Dockerfile -t "${IMAGE}" .
          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV

      - name: Login to Docker registry
        uses: docker/login-action@v5
        with:
          registry: ${{ secrets.DOCKER_REGISTRY || 'docker.io' }}
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Push backend Docker image
        run: |
          docker push "$IMAGE"

      - name: Deploy backend to staging host
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ env.STAGING_SSH_HOST }}
          username: ${{ env.STAGING_SSH_USER }}
          key: ${{ env.STAGING_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            DOCKER_REGISTRY="${{ env.DOCKER_REGISTRY }}"
            if [ -z "${DOCKER_REGISTRY}" ]; then
              DOCKER_REGISTRY="docker.io"
            fi
            IMAGE_NAME="${{ env.DOCKER_IMAGE_NAME:-web3-content-platform-backend }}"
            IMAGE="${DOCKER_REGISTRY}/${IMAGE_NAME}:staging-${{ github.run_number }}"
            CONTAINER_NAME="${{ env.STAGING_CONTAINER_NAME:-web3-backend }}"
            echo "Deploying ${IMAGE} as ${CONTAINER_NAME}"
            docker login "${DOCKER_REGISTRY}" -u "${{ env.DOCKER_USERNAME }}" -p "${{ env.DOCKER_PASSWORD }}"
            docker pull "${IMAGE}"
            docker stop "${CONTAINER_NAME}" || true
            docker rm "${CONTAINER_NAME}" || true
            docker run -d --name "${CONTAINER_NAME}" --restart always -p 5000:5000 "${IMAGE}"
            docker ps -f name="${CONTAINER_NAME}"

      - name: Run deployment smoke tests
        run: |
          DEPLOYMENT_URL="${STAGING_URL:-http://${STAGING_SSH_HOST}:5000}"
          echo "Deployment URL: ${DEPLOYMENT_URL}"
          chmod +x integration-tests/smoke/run-deployment-smoke-tests.sh
          ./integration-tests/smoke/run-deployment-smoke-tests.sh --url="${DEPLOYMENT_URL}" --environment=staging
